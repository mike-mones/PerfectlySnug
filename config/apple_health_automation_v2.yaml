- id: apple_health_import
  alias: Apple Health Import
  description: Receives health data from Health Auto Export (handles both aggregated and disaggregated formats)
  triggers:
  - platform: webhook
    webhook_id: apple_health_import
    allowed_methods:
    - POST
    local_only: false
  actions:
  - action: system_log.write
    data:
      message: >
        Apple Health DEBUG: keys={{ trigger.json.keys() | list }},
        full_payload={{ trigger.json | tojson | truncate(500) }}
      level: warning
  - variables:
      metrics: "{{ trigger.json.data.metrics | default([]) }}"
      has_metrics: "{{ metrics | length > 0 }}"
  - if:
    - condition: template
      value_template: "{{ has_metrics }}"
    then:
    - variables:
        # Heart Rate — handles both aggregated {Avg,Min,Max} and disaggregated {qty}
        # Uses LAST data point (most recent) from the array
        hr_metric: >
          {% set m = metrics | selectattr('name', 'eq', 'heart_rate') | list %}
          {% if m and m[0].data %}{{ m[0].data[-1] | tojson }}{% else %}{}{% endif %}
        hr_avg: >
          {% set m = metrics | selectattr('name', 'eq', 'heart_rate') | list %}
          {% if m and m[0].data %}
            {% set d = m[0].data[-1] %}
            {{ d.Avg | default(d.qty | default(0)) | float(0) }}
          {% else %}0{% endif %}
        hr_min: >
          {% set m = metrics | selectattr('name', 'eq', 'heart_rate') | list %}
          {% if m and m[0].data %}
            {% set d = m[0].data[-1] %}
            {{ d.Min | default(d.qty | default(0)) | float(0) }}
          {% else %}0{% endif %}
        hr_max: >
          {% set m = metrics | selectattr('name', 'eq', 'heart_rate') | list %}
          {% if m and m[0].data %}
            {% set d = m[0].data[-1] %}
            {{ d.Max | default(d.qty | default(0)) | float(0) }}
          {% else %}0{% endif %}
        # HRV — always uses qty, grab last point only
        hrv_val: >
          {% set m = metrics | selectattr('name', 'eq', 'heart_rate_variability') | list %}
          {% if m and m[0].data %}{{ m[0].data[-1].qty | default(0) | float(0) }}{% else %}0{% endif %}
        # Resting HR
        rhr_val: >
          {% set m = metrics | selectattr('name', 'eq', 'resting_heart_rate') | list %}
          {% if m and m[0].data %}{{ m[0].data[-1].qty | default(0) | float(0) }}{% else %}0{% endif %}
        # Wrist temp
        wrist_val: >
          {% set m = metrics | selectattr('name', 'eq', 'apple_sleeping_wrist_temperature') | list %}
          {% if m and m[0].data %}{{ m[0].data[-1].qty | default(0) | float(0) }}{% else %}0{% endif %}
        # Respiratory rate
        resp_val: >
          {% set m = metrics | selectattr('name', 'eq', 'respiratory_rate') | list %}
          {% if m and m[0].data %}{{ m[0].data[-1].qty | default(0) | float(0) }}{% else %}0{% endif %}
        # SpO2
        spo2_val: >
          {% set m = metrics | selectattr('name', 'eq', 'blood_oxygen_saturation') | list %}
          {% if m and m[0].data %}{{ m[0].data[-1].qty | default(0) | float(0) }}{% else %}0{% endif %}
        # Sleep analysis (aggregated format)
        sleep_data: >
          {% set m = metrics | selectattr('name', 'eq', 'sleep_analysis') | list %}
          {% if m and m[0].data %}{{ m[0].data[-1] | tojson }}{% else %}{}{% endif %}
        # Breathing disturbances
        breathing_val: >
          {% set m = metrics | selectattr('name', 'eq', 'breathing_disturbances') | list %}
          {% if m and m[0].data %}{{ m[0].data[-1].qty | default(0) | float(0) }}{% else %}0{% endif %}
        # Sleep stage (real-time from SleepSync)
        sleep_stage_val: >
          {% set m = metrics | selectattr('name', 'eq', 'sleep_stage') | list %}
          {% if m and m[0].data %}{{ m[0].data[-1].stage | default('unknown') }}{% else %}unknown{% endif %}
    # Only set values that are within valid range (prevents "invalid value" errors)
    - if:
      - condition: template
        value_template: "{{ hr_avg | float(0) >= 20 }}"
      then:
      - action: input_number.set_value
        target:
          entity_id: input_number.apple_health_hr_avg
        data:
          value: "{{ hr_avg | float(0) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.apple_health_hr_min
        data:
          value: "{{ [hr_min | float(0), 20] | max }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.apple_health_hr_max
        data:
          value: "{{ [hr_max | float(0), 20] | max }}"
    - if:
      - condition: template
        value_template: "{{ hrv_val | float(0) > 0 }}"
      then:
      - action: input_number.set_value
        target:
          entity_id: input_number.apple_health_hrv
        data:
          value: "{{ hrv_val | float(0) }}"
    - if:
      - condition: template
        value_template: "{{ rhr_val | float(0) >= 20 }}"
      then:
      - action: input_number.set_value
        target:
          entity_id: input_number.apple_health_resting_hr
        data:
          value: "{{ rhr_val | float(0) }}"
    - if:
      - condition: template
        value_template: "{{ wrist_val | float(0) != 0 }}"
      then:
      - action: input_number.set_value
        target:
          entity_id: input_number.apple_health_wrist_temp
        data:
          value: "{{ wrist_val | float(0) }}"
    - if:
      - condition: template
        value_template: "{{ resp_val | float(0) > 0 }}"
      then:
      - action: input_number.set_value
        target:
          entity_id: input_number.apple_health_respiratory_rate
        data:
          value: "{{ resp_val | float(0) }}"
    - if:
      - condition: template
        value_template: "{{ spo2_val | float(0) > 0 }}"
      then:
      - action: input_number.set_value
        target:
          entity_id: input_number.apple_health_spo2
        data:
          value: "{{ spo2_val | float(0) }}"
    - if:
      - condition: template
        value_template: "{{ (sleep_data | from_json).deep is defined }}"
      then:
      - variables:
          sleep: "{{ sleep_data | from_json }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.apple_health_sleep_deep_hrs
        data:
          value: "{{ sleep.deep | default(0) | float(0) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.apple_health_sleep_rem_hrs
        data:
          value: "{{ sleep.rem | default(0) | float(0) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.apple_health_sleep_core_hrs
        data:
          value: "{{ sleep.core | default(0) | float(0) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.apple_health_sleep_awake_hrs
        data:
          value: "{{ sleep.awake | default(0) | float(0) }}"
    - if:
      - condition: template
        value_template: "{{ breathing_val | float(0) > 0 }}"
      then:
      - action: input_number.set_value
        target:
          entity_id: input_number.apple_health_breathing_disturbances
        data:
          value: "{{ breathing_val | float(0) }}"
    - if:
      - condition: template
        value_template: "{{ sleep_stage_val != 'unknown' }}"
      then:
      - action: input_text.set_value
        target:
          entity_id: input_text.apple_health_sleep_stage
        data:
          value: "{{ sleep_stage_val }}"
    - action: logbook.log
      data:
        name: Apple Health
        message: >
          Imported: HR={{ hr_avg }}, HRV={{ hrv_val }},
          RHR={{ rhr_val }}, Wrist={{ wrist_val }}°F
    else:
    - action: system_log.write
      data:
        message: "Apple Health webhook: no metrics array in payload"
        level: warning
  mode: queued
  max: 10
